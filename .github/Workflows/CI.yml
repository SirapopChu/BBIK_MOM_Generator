name: CI

on:
  push:
    branches: [main, dev, feature/**]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Backend Dependencies
        working-directory: Backend
        run: |
          npm install

      - name: Run Backend Lint
        working-directory: Backend
        run: |
          if [ -f package.json ] && npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script defined in Backend/package.json, skipping."
          fi

      - name: Run Backend Test Helper
        working-directory: Backend
        run: |
          if [ -f test-whisper.js ]; then
            node test-whisper.js || echo "Skipping failing live API test in CI. This should run locally."
          else
            echo "No test-whisper.js found, skipping."
          fi

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        working-directory: Frontend/my-app
        run: |
          npm install

      - name: Run Frontend Typecheck
        working-directory: Frontend/my-app
        run: |
          if [ -f package.json ] && npm run | grep -q "type-check\|lint"; then
            npm run lint || true
            npm run type-check || true
          else
            echo "No lint/type-check scripts found for frontend."
          fi

      - name: Run Frontend Build
        working-directory: Frontend/my-app
        run: |
          npm run build

  docs:
    name: Docs validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate README exists
        run: |
          if [ ! -f Backend/README.md ]; then
            echo "Backend README not found" && exit 1
          fi
          if [ ! -f Frontend/my-app/README.md ]; then
            echo "Frontend README not found" && exit 1
          fi
