services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    env_file: ./Backend/.env
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend/my-app
      dockerfile: Dockerfile
      args:
        # Internal Docker network: frontend talks to backend by service name.
        NEXT_PUBLIC_API_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
